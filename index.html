<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#071a02">
<title>Copa Costão</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#071a02;--bg2:#0b2505;--card:#112a08;
  --gold:#FFD700;--green:#27ae60;--red:#c0392b;
  --text:#f0f0f0;--muted:#7a9c7a;--border:#1e4018;
}
body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
/* HEADER */
header{background:linear-gradient(135deg,#0a2a00 0%,#1a5a00 100%);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold)}
#backBtn{background:none;border:none;color:var(--gold);font-size:30px;cursor:pointer;display:none;align-items:center;justify-content:center;width:36px;height:36px;padding:0;line-height:1;flex-shrink:0}
#backBtn.visible{display:flex}
#headerLogo{height:48px;object-fit:contain;flex:1;display:block}
#mgrBtn{background:rgba(255,215,0,.15);border:1.5px solid var(--gold);color:var(--gold);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* HOME */
#homeView{padding:14px}
.home-title{text-align:center;color:var(--gold);font-size:18px;font-weight:bold;margin-bottom:14px;letter-spacing:1px}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.player-card:active{transform:scale(.97);box-shadow:0 0 0 2px var(--gold)}
.player-photo{width:100%;aspect-ratio:1/1;background-size:cover;background-position:center top;background-color:#0a2005}
.player-name{padding:7px 8px 3px;font-weight:bold;font-size:13px;text-align:center;color:var(--text)}
.player-gols{padding:3px 8px 9px;font-size:13px;color:var(--gold);text-align:center}
.collab-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;max-height:160px;overflow-y:auto;padding:4px 0}
.collab-chip{background:var(--bg2);border:1.5px solid var(--border);border-radius:20px;padding:6px 11px;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent}
.collab-chip.selected{background:var(--green);border-color:var(--green);color:#fff;font-weight:bold}
.collab-sel-hint{font-size:11px;color:var(--muted);margin-bottom:8px}
/* ALBUM */
#albumView{padding:14px;display:none}
.album-top{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.album-foto{width:84px;height:84px;border-radius:50%;background-size:cover;background-position:center top;background-color:#0a2005;border:3px solid var(--gold);flex-shrink:0}
.album-nome{font-size:20px;font-weight:bold;margin-bottom:8px}
.album-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold);color:#000;padding:5px 14px;border-radius:20px;font-weight:bold;font-size:15px}
.sec-title{font-size:15px;font-weight:bold;color:var(--gold);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* CORINGAS */
.coringas-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.coringa-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:12px;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.coringa-card.earned{border-color:var(--gold);background:#142a00}
.coringa-gols{font-size:11px;color:var(--muted)}
.coringa-img{width:68px;height:auto;border-radius:8px;margin:4px 0}
.coringa-lock{font-size:26px}
.coringa-premio{font-size:11px;color:var(--text);line-height:1.3}
.coringa-card.earned .coringa-premio{color:var(--gold);font-weight:bold}
.locked-text{color:var(--muted)}
/* STICKERS */
.stickers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sticker-card{background:var(--card);border:2px solid;border-radius:12px;padding:12px;text-align:center}
.sticker-qty{font-size:22px;font-weight:bold;margin-bottom:2px}
.sticker-nome{font-size:12px;font-weight:bold;margin:3px 0}
.sticker-gols{font-size:11px;color:var(--muted)}
.no-stickers{color:var(--muted);text-align:center;padding:24px;font-style:italic;grid-column:1/-1}
/* PUNIÇÕES */
.punicoes-list{display:flex;flex-direction:column;gap:8px}
.pu-item{background:#1f0000;border:1px solid #4a0000;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;font-size:13px}
.pu-emoji{font-size:20px;flex-shrink:0}
.pu-desc{flex:1;color:var(--text)}
.pu-gols{color:var(--red);font-weight:bold;flex-shrink:0}
.pu-date{color:var(--muted);font-size:11px;flex-shrink:0}
/* EVENTS */
.events-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.ev-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;font-size:12px}
.ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ev-desc{flex:1;color:var(--text)}
.ev-gols{font-weight:bold;flex-shrink:0}
.ev-gols.plus{color:var(--green)}
.ev-gols.minus{color:var(--red)}
.ev-date{color:var(--muted);font-size:11px;flex-shrink:0}
/* MANAGER */
#managerView{padding:14px;display:none}
.mgr-head{text-align:center;margin-bottom:18px}
.mgr-head h2{color:var(--gold);font-size:22px}
.mgr-sub{color:var(--muted);font-size:13px;margin-top:4px}
.mgr-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.mgr-card h3{color:var(--text);font-size:15px;margin-bottom:12px}
select{width:100%;padding:12px;background:#0d2508;border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:14px;margin-bottom:10px;-webkit-appearance:none;appearance:none}
.btn-p{width:100%;padding:14px;background:linear-gradient(135deg,#145c00,#27ae60);border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:4px}
.btn-d{width:100%;padding:14px;background:linear-gradient(135deg,#5c0000,#c0392b);border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:4px}
.btn-out{width:100%;padding:12px;background:transparent;border:1px solid var(--muted);color:var(--muted);border-radius:8px;font-size:14px;cursor:pointer;margin-top:8px}
.rank-item{display:flex;align-items:center;padding:8px 4px;border-bottom:1px solid var(--border);gap:12px}
.rank-item:last-child{border-bottom:none}
.rank-pos{color:var(--gold);font-weight:bold;font-size:14px;min-width:28px}
.rank-nome{flex:1;font-size:14px}
.rank-gols{color:var(--gold);font-size:14px}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal.open{display:flex}
.modal-box{background:#0b2005;border:2px solid var(--gold);border-radius:18px;padding:24px;width:300px;max-width:100%}
.modal-box h3{color:var(--gold);text-align:center;font-size:18px;margin-bottom:18px}
.modal-box input[type=password]{width:100%;padding:13px;background:#0d2508;border:1.5px solid var(--border);color:var(--text);border-radius:8px;font-size:16px;margin-bottom:14px;text-align:center;letter-spacing:3px}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:13px;border-radius:8px;font-size:15px;cursor:pointer;border:none;font-weight:bold}
.btn-enter{background:var(--green);color:#fff}
.btn-cancel{background:#222;color:var(--muted)}

/* CARTAS REAIS */
.sticker-card-img{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-align:center;padding-bottom:10px}
.sticker-img-wrap{position:relative;display:inline-block;width:100%}
.sticker-img-real{width:100%;display:block;border-radius:0}
.sticker-qty-badge{position:absolute;top:6px;right:6px;background:var(--gold);color:#000;font-weight:bold;font-size:13px;padding:2px 8px;border-radius:12px}
.sticker-img-label{font-size:12px;font-weight:bold;color:var(--text);padding:6px 8px 2px}
.sticker-img-gols{font-size:11px;color:var(--gold)}

/* CORREÇÃO DE ERROS */
.mgr-card-danger{border-color:#4a1000!important}
.corr-hint{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.4}
.corr-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;max-height:320px;overflow-y:auto}
.corr-item{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 10px}
.corr-item-pun{background:#1a0000;border-color:#4a0000}
.corr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.corr-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.corr-label{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.corr-date{font-size:10px;color:var(--muted)}
.corr-gols{font-size:13px;font-weight:bold;flex-shrink:0}
.corr-gols.plus{color:var(--green)}
.corr-gols.minus{color:var(--red)}
.corr-del{background:#3a0000;border:1px solid #7a0000;color:#ff6b6b;width:28px;height:28px;border-radius:6px;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:bold}
.corr-del:active{background:#5a0000}
.corr-empty{color:var(--muted);font-size:13px;text-align:center;padding:16px;font-style:italic}

/* CARTA PICKER */
.carta-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;max-height:360px;overflow-y:auto;padding:2px}
.carta-pick{background:var(--bg2);border:2px solid var(--border);border-radius:10px;padding:6px;text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.carta-pick:active{transform:scale(.96)}
.carta-pick.selected{border-color:var(--gold);background:#1a3500}
.carta-pick-img{width:100%;border-radius:6px;display:block;margin-bottom:4px}
.carta-pick-fallback{height:60px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#fff;margin-bottom:4px}
.carta-pick-nome{font-size:10px;color:var(--text);font-weight:bold;line-height:1.2}
.carta-pick-gols{font-size:10px;color:var(--gold);margin-top:2px}

/* RANKING */
.rank-open-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1a5c00,#27ae60);border:none;color:#fff;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;margin-bottom:14px;letter-spacing:.5px}
#rankingView{padding:14px}
.rank-tabs{display:flex;gap:8px;margin-bottom:16px}
.rank-tab{flex:1;padding:11px 4px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;text-align:center;transition:all .15s}
.rank-tab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.rank-list{display:flex;flex-direction:column;gap:10px}
.rank-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer}
.rank-row:active{transform:scale(.98)}
.rank-row.top1{border-color:#FFD700;background:#1a3000}
.rank-row.top2{border-color:#C0C0C0}
.rank-row.top3{border-color:#CD7F32}
.rank-medal{font-size:22px;width:28px;text-align:center;flex-shrink:0}
.rank-avatar{width:46px;height:46px;border-radius:50%;background-size:cover;background-position:center top;background-color:#0a2005;flex-shrink:0;border:2px solid var(--border)}
.rank-row.top1 .rank-avatar{border-color:var(--gold)}
.rank-info{flex:1;min-width:0}
.rank-info-nome{font-size:15px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-info-sub{font-size:11px;color:var(--muted);margin-top:2px}
.rank-score{font-size:20px;font-weight:bold;color:var(--gold);flex-shrink:0}
.rank-zero{color:var(--muted);text-align:center;padding:30px;font-style:italic}
.rank-head{text-align:center;margin-bottom:18px}
.rank-head h2{color:var(--gold);font-size:20px}
.rank-head p{color:var(--muted);font-size:13px;margin-top:4px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a4a00;border:1.5px solid var(--green);color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:bold;z-index:300;transition:transform .3s;max-width:90vw;text-align:center;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <button id="backBtn" onclick="goBack()">&#8249;</button>
  <img id="headerLogo" alt="Copa Costão" style="visibility:hidden" onload="this.style.visibility='visible'">
  <button id="mgrBtn" onclick="openManager()" title="Painel Gerente">&#9881;</button>
</header>
<div id="homeView">
  <div class="home-title">&#127942; COPA COSTÃO</div>
  <button class="rank-open-btn" onclick="openRanking()">&#127942; Ranking Goleadores</button>
  <div id="grid"></div>
</div>
<div id="albumView"></div>
<div id="managerView"></div>
<div id="rankingView" style="display:none"></div>
<!-- Password modal -->
<div id="pwModal" class="modal">
  <div class="modal-box">
    <h3>&#128274; Acesso Gerente</h3>
    <input type="password" id="pwInput" placeholder="Digite a senha">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePw()">Cancelar</button>
      <button class="btn-enter" onclick="checkPass()">Entrar</button>
    </div>
  </div>
</div>
<!-- Toast -->
<div id="toast" class="toast"></div>
<script>
// ============ CONFIGURAÇÕES ============
const SENHA = 'copa2026';

// ============ DADOS INICIAIS (ZERADOS) ============
let SEEDS = [];
let COLABS = [];
let MILESTONES = [
  {gols:5, emoji:'🍔', premio:'Lanche do Dia'},
  {gols:10, emoji:'🎁', premio:'Kit Surpresa'},
  {gols:15, emoji:'🏆', premio:'Troféu Bronze'},
  {gols:20, emoji:'🥈', premio:'Troféu Prata'},
  {gols:25, emoji:'🥇', premio:'Troféu Ouro'},
  {gols:30, emoji:'👑', premio:'Coroa de Artilheiro'},
  {gols:50, emoji:'🔥', premio:'Lenda da Copa'},
  {gols:100, emoji:'⭐', premio:'Hall da Fama'}
];
let STICKERS = [
  {id:'s1', nome:'Chuteira de Ouro', gols:1, cor:'#FFD700', carta:'chuteira'},
  {id:'s2', nome:'Gol de Placa', gols:3, cor:'#27ae60', carta:'placa'},
  {id:'s3', nome:'Hat-Trick', gols:5, cor:'#e74c3c', carta:'hat'},
  {id:'s4', nome:'Gol de Voleio', gols:2, cor:'#3498db', carta:'voleio'},
  {id:'s5', nome:'Gol de Falta', gols:2, cor:'#9b59b6', carta:'falta'},
  {id:'s6', nome:'Gol de Cabeça', gols:2, cor:'#f39c12', carta:'cabeca'},
  {id:'s7', nome:'Gol Olímpico', gols:3, cor:'#1abc9c', carta:'olimpico'},
  {id:'s8', nome:'Golaço', gols:3, cor:'#e91e63', carta:'golaco'},
  {id:'s9', nome:'Assistência Mágica', gols:1, cor:'#00bcd4', carta:'assist'},
  {id:'s10', nome:'Pênalti Convertido', gols:1, cor:'#ff5722', carta:'penalti'}
];
let PUNICOES = [
  {id:'p1', desc:'Cartão Amarelo', gols:-2, emoji:'🟨'},
  {id:'p2', desc:'Cartão Vermelho', gols:-5, emoji:'🟥'},
  {id:'p3', desc:'Advertência Verbal', gols:-1, emoji:'⚠️'}
];

// ============ IMGS (URLs de placeholder) ============
const IMGS = {
  logo: 'https://via.placeholder.com/200x50/0a2a00/FFD700?text=COPA+COSTAO',
  coringa: 'https://via.placeholder.com/68x68/FFD700/000?text=⭐',
  chuteira: 'https://via.placeholder.com/150x200/FFD700/000?text=Chuteira',
  placa: 'https://via.placeholder.com/150x200/27ae60/fff?text=Placa',
  hat: 'https://via.placeholder.com/150x200/e74c3c/fff?text=Hat-Trick',
  voleio: 'https://via.placeholder.com/150x200/3498db/fff?text=Voleio',
  falta: 'https://via.placeholder.com/150x200/9b59b6/fff?text=Falta',
  cabeca: 'https://via.placeholder.com/150x200/f39c12/fff?text=Cabeça',
  olimpico: 'https://via.placeholder.com/150x200/1abc9c/fff?text=Olímpico',
  golaco: 'https://via.placeholder.com/150x200/e91e63/fff?text=Golaço',
  assist: 'https://via.placeholder.com/150x200/00bcd4/fff?text=Assist',
  penalti: 'https://via.placeholder.com/150x200/ff5722/fff?text=Pênalti'
};

// ============ ESTADO ============
let _curAlbumId = null;
let _viewStack = ['home'];
let _mgrTab = 'dash';
let _rankTab = 'hoje';
let _selCollabs = [];
let _selCarta = null;

// ============ FUNÇÕES UTILITÁRIAS ============
function fmt(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('pt-BR');
}
function formatDate(d) {
  return fmt(d);
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}
function save() {
  localStorage.setItem('copa_costao_data', JSON.stringify({SEEDS, COLABS, MILESTONES, STICKERS, PUNICOES}));
}
function load() {
  const raw = localStorage.getItem('copa_costao_data');
  if (raw) {
    try {
      const data = JSON.parse(raw);
      if (data.SEEDS) SEEDS = data.SEEDS;
      if (data.COLABS) COLABS = data.COLABS;
      if (data.MILESTONES) MILESTONES = data.MILESTONES;
      if (data.STICKERS) STICKERS = data.STICKERS;
      if (data.PUNICOES) PUNICOES = data.PUNICOES;
    } catch (e) {}
  }
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ NAVEGAÇÃO ============
function showView(name) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('albumView').style.display = 'none';
  document.getElementById('managerView').style.display = 'none';
  document.getElementById('rankingView').style.display = 'none';

  if (name === 'home') {
    document.getElementById('homeView').style.display = 'block';
    document.getElementById('backBtn').classList.remove('visible');
    renderHome();
  } else if (name === 'album') {
    document.getElementById('albumView').style.display = 'block';
    document.getElementById('backBtn').classList.add('visible');
  } else if (name === 'manager') {
    document.getElementById('managerView').style.display = 'block';
    document.getElementById('backBtn').classList.add('visible');
    renderManager();
  } else if (name === 'ranking') {
    document.getElementById('rankingView').style.display = 'block';
    document.getElementById('backBtn').classList.add('visible');
    renderRanking();
  }

  if (name !== 'home' && !_viewStack.includes(name)) {
    _viewStack.push(name);
  }
}
function goBack() {
  if (_viewStack.length > 1) {
    _viewStack.pop();
    const prev = _viewStack[_viewStack.length - 1];
    showView(prev);
  } else {
    showView('home');
  }
}

// ============ RENDER HOME ============
function renderHome() {
  const grid = document.getElementById('grid');
  if (!SEEDS.length) {
    grid.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-style:italic">Nenhum jogador cadastrado.<br>Use o Painel do Gerente para adicionar.</div>';
    return;
  }
  let html = '';
  for (const s of SEEDS) {
    const col = getCol(s.id);
    const gols = totalGols(col);
    const foto = IMGS[s.fk] || '';
    html += `<div class="player-card" onclick="openAlbum('${s.id}')">`;
    html += `<div class="player-photo" style="background-image:url('${foto}')"></div>`;
    html += `<div class="player-name">${s.nome}</div>`;
    html += `<div class="player-gols">⚽ ${gols} gols</div>`;
    html += `</div>`;
  }
  grid.innerHTML = html;
}

// ============ ALBUM / PERFIL DO JOGADOR ============
function getSeed(id) { return SEEDS.find(s => s.id === id) || {}; }
function getCol(id) { return COLABS.find(c => c.sid === id) || {sid:id, fig:[], pun:[]}; }
function totalGols(col) {
  if (!col) return 0;
  let g = 0;
  for (const f of (col.fig || [])) {
    const st = STICKERS.find(s => s.id === f.sid);
    if (st) g += st.gols;
  }
  for (const p of (col.pun || [])) {
    const pu = PUNICOES.find(x => x.id === p.pid);
    if (pu) g += pu.gols;
  }
  return g;
}
function earned(gols) {
  return MILESTONES.filter(m => gols >= m.gols);
}

function openAlbum(colId) {
  _curAlbumId = colId;
  const sd = getSeed(colId);
  const col = getCol(colId);
  const gols = totalGols(col);
  const foto = IMGS[sd.fk] || '';
  const earnedList = earned(gols);

  // Coringas
  let cgHtml = '<div class="coringas-grid">';
  for (const m of MILESTONES) {
    const ok = gols >= m.gols;
    cgHtml += `<div class="coringa-card${ok ? ' earned' : ''}">`;
    cgHtml += `<div class="coringa-gols">${m.gols} gols</div>`;
    if (ok) {
      cgHtml += `<img class="coringa-img" src="${IMGS.coringa || ''}">`;
      cgHtml += `<div class="coringa-premio">${m.emoji} ${m.premio}</div>`;
    } else {
      cgHtml += `<div class="coringa-lock">🔒</div>`;
      cgHtml += `<div class="coringa-premio locked-text">${m.emoji} ${m.premio}</div>`;
    }
    cgHtml += '</div>';
  }
  cgHtml += '</div>';

  // Stickers
  let stHtml = '<div class="stickers-grid">';
  if (!col.fig.length) {
    stHtml += '<div class="no-stickers">Nenhuma figurinha ainda</div>';
  } else {
    for (const f of col.fig) {
      const st = STICKERS.find(s => s.id === f.sid);
      if (!st) continue;
      const cartaImg = st.carta && IMGS[st.carta] ? IMGS[st.carta] : '';
      if (cartaImg) {
        stHtml += `<div class="sticker-card-img">`;
        stHtml += `<div class="sticker-img-wrap"><img src="${cartaImg}" class="sticker-img-real" alt="${st.nome}">`;
        stHtml += `</div>`;
        stHtml += `<div class="sticker-img-label">${st.nome}</div>`;
        stHtml += `<div class="sticker-img-gols">${st.gols} gol${st.gols > 1 ? 's' : ''}</div>`;
        stHtml += '</div>';
      } else {
        stHtml += `<div class="sticker-card" style="border-color:${st.cor}">`;
        stHtml += `<div class="sticker-nome" style="color:${st.cor}">${st.nome}</div>`;
        stHtml += `<div class="sticker-gols">${st.gols} gol${st.gols > 1 ? 's' : ''}</div>`;
        stHtml += '</div>';
      }
    }
  }
  stHtml += '</div>';

  // History
  const allEvs = [
    ...col.fig.map(f => { const st = STICKERS.find(x => x.id === f.sid); return {tipo:'fig', d:f.dt, st, gols: st ? st.gols : 0}; }),
    ...col.pun.map(p => { const pu = PUNICOES.find(x => x.id === p.pid); return {tipo:'pun', d:p.dt, pu, gols: pu ? pu.gols : 0}; })
  ].sort((a, b) => new Date(b.d) - new Date(a.d));

  let evHtml = '<div class="events-list">';
  if (!allEvs.length) {
    evHtml += '<div class="no-stickers">Sem eventos ainda</div>';
  } else {
    for (const ev of allEvs) {
      if (ev.tipo === 'fig' && ev.st) {
        evHtml += `<div class="ev-item">`;
        evHtml += `<div class="ev-dot" style="background:${ev.st.cor}"></div>`;
        evHtml += `<div class="ev-desc">📌 ${ev.st.nome}</div>`;
        evHtml += `<div class="ev-gols plus">+${ev.gols}</div>`;
        evHtml += `<div class="ev-date">${fmt(ev.d)}</div>`;
        evHtml += '</div>';
      } else if (ev.tipo === 'pun' && ev.pu) {
        evHtml += `<div class="ev-item">`;
        evHtml += `<div class="ev-dot" style="background:#c0392b"></div>`;
        evHtml += `<div class="ev-desc">${ev.pu.emoji} ${ev.pu.desc}</div>`;
        evHtml += `<div class="ev-gols minus">${ev.gols}</div>`;
        evHtml += `<div class="ev-date">${fmt(ev.d)}</div>`;
        evHtml += '</div>';
      }
    }
  }
  evHtml += '</div>';

  // Punições
  let punHtml = '';
  if (col.pun.length > 0) {
    punHtml = '<div class="sec-title">⚠️ Punições Recebidas</div><div class="punicoes-list">';
    for (const p of [...col.pun].reverse()) {
      const pu = PUNICOES.find(x => x.id === p.pid);
      if (!pu) continue;
      punHtml += `<div class="pu-item">`;
      punHtml += `<span class="pu-emoji">${pu.emoji}</span>`;
      punHtml += `<span class="pu-desc">${pu.desc}</span>`;
      punHtml += `<span class="pu-gols">${pu.gols}</span>`;
      punHtml += `<span class="pu-date">${formatDate(p.dt)}</span>`;
      punHtml += '</div>';
    }
    punHtml += '</div>';
  }

  document.getElementById('albumView').innerHTML =
    `<div class="album-top">` +
    `<div class="album-foto" style="background-image:url('${foto}')"></div>` +
    `<div><div class="album-nome">${sd.nome}</div><div class="album-badge"><span>⚽</span><span>${gols} gols</span></div></div>` +
    `</div>` +
    `<div class="sec-title">🃏 Figurinhas Coringa</div>${cgHtml}` +
    `<div class="sec-title">📚 Figurinhas Coletadas</div>${stHtml}` +
    `<div class="sec-title">📋 Histórico</div>${evHtml}` +
    punHtml;

  showView('album');
}

function renderRankList() {
  const list = document.getElementById('rankList');
  if (!SEEDS.length) {
    list.innerHTML = '<div class="rank-zero">Nenhum jogador cadastrado</div>';
    return;
  }

  // Calcular gols por período
  const now = new Date();
  const hoje = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const inicioSemana = new Date(hoje);
  inicioSemana.setDate(hoje.getDate() - hoje.getDay());
  const inicioMes = new Date(now.getFullYear(), now.getMonth(), 1);

  let ranking = SEEDS.map(s => {
    const col = getCol(s.id);
    let gols = 0;
    for (const f of col.fig) {
      const dt = new Date(f.dt);
      if (_rankTab === 'hoje' && dt >= hoje) gols += STICKERS.find(x => x.id === f.sid)?.gols || 0;
      else if (_rankTab === 'semana' && dt >= inicioSemana) gols += STICKERS.find(x => x.id === f.sid)?.gols || 0;
      else if (_rankTab === 'mes' && dt >= inicioMes) gols += STICKERS.find(x => x.id === f.sid)?.gols || 0;
    }
    for (const p of col.pun) {
      const dt = new Date(p.dt);
      if (_rankTab === 'hoje' && dt >= hoje) gols += PUNICOES.find(x => x.id === p.pid)?.gols || 0;
      else if (_rankTab === 'semana' && dt >= inicioSemana) gols += PUNICOES.find(x => x.id === p.pid)?.gols || 0;
      else if (_rankTab === 'mes' && dt >= inicioMes) gols += PUNICOES.find(x => x.id === p.pid)?.gols || 0;
    }
    return {id: s.id, nome: s.nome, gols, fk: s.fk};
  }).filter(x => x.gols > 0).sort((a, b) => b.gols - a.gols);

  if (!ranking.length) {
    list.innerHTML = '<div class="rank-zero">Nenhum gol registrado neste período</div>';
    return;
  }

  let html = '';
  for (let i = 0; i < ranking.length; i++) {
    const r = ranking[i];
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}º`;
    const topClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const foto = IMGS[r.fk] || '';
    html += `<div class="rank-row ${topClass}" onclick="openAlbum('${r.id}')">`;
    html += `<div class="rank-medal">${medal}</div>`;
    html += `<div class="rank-avatar" style="background-image:url('${foto}')"></div>`;
    html += `<div class="rank-info"><div class="rank-info-nome">${r.nome}</div></div>`;
    html += `<div class="rank-score">${r.gols}</div>`;
    html += '</div>';
  }
  list.innerHTML = html;
}

let _golsTemp = {};
function ajustarGol(id, delta) {
  if (!_golsTemp[id]) _golsTemp[id] = 0;
  _golsTemp[id] += delta;
  if (_golsTemp[id] < 0) _golsTemp[id] = 0;
  const el = document.getElementById('gol_' + id);
  if (el) el.textContent = _golsTemp[id];
}
function salvarGols() {
  const periodo = document.getElementById('golPeriodo').value;
  const stickerId = periodo === 'hoje' ? 's1' : periodo === 'semana' ? 's2' : 's3';
  const st = STICKERS.find(s => s.id === stickerId);

  let total = 0;
  for (const id in _golsTemp) {
    const qtd = _golsTemp[id];
    if (qtd > 0) {
      const col = getCol(id);
      for (let i = 0; i < qtd; i++) {
        col.fig.push({sid: stickerId, dt: new Date().toISOString()});
      }
      total += qtd;
    }
  }

  if (total === 0) { toast('Nenhum gol para salvar'); return; }

  save();
  _golsTemp = {};
  toast(`${total} gol(s) lançado(s) com sucesso!`);
  renderManager();
}

  const punId = document.getElementById('punTipo').value;
  if (!jogadorId || !punId) { toast('Selecione jogador e punição'); return; }

  const col = getCol(jogadorId);
  col.pun.push({pid: punId, dt: new Date().toISOString()});
  save();
  toast('Punição aplicada!');
  renderManager();
}

function renderCorrigir(el) {
  let html = '<div class="mgr-card mgr-card-danger"><h3>❌ Corrigir Erro</h3>';
  html += '<div class="corr-hint">Selecione o jogador para ver e remover lançamentos incorretos:</div>';
  html += '<select id="corrJogador" onchange="renderCorrList()">';
  html += '<option value="">Selecione o jogador</option>';
  for (const s of SEEDS) html += `<option value="${s.id}">${s.nome}</option>`;
  html += '</select>';
  html += '<div id="corrList"></div>';
  html += '</div>';
  el.innerHTML = html;
}
function renderCorrList() {
  const id = document.getElementById('corrJogador').value;
  const list = document.getElementById('corrList');
  if (!id) { list.innerHTML = ''; return; }

  const col = getCol(id);
  let html = '<div class="corr-list">';

  // Figurinhas
  for (let i = col.fig.length - 1; i >= 0; i--) {
    const f = col.fig[i];
    const st = STICKERS.find(s => s.id === f.sid);
    if (!st) continue;
    html += `<div class="corr-item">`;
    html += `<div class="corr-dot" style="background:${st.cor}"></div>`;
    html += `<div class="corr-info"><div class="corr-label">📌 ${st.nome}</div><div class="corr-date">${fmt(f.dt)}</div></div>`;
    html += `<div class="corr-gols plus">+${st.gols}</div>`;
    html += `<button class="corr-del" onclick="removerEvento('${id}', 'fig', ${i})">×</button>`;
    html += '</div>';
  }

  // Punições
  for (let i = col.pun.length - 1; i >= 0; i--) {
    const p = col.pun[i];
    const pu = PUNICOES.find(x => x.id === p.pid);
    if (!pu) continue;
    html += `<div class="corr-item corr-item-pun">`;
    html += `<div class="corr-dot" style="background:#c0392b"></div>`;
    html += `<div class="corr-info"><div class="corr-label">${pu.emoji} ${pu.desc}</div><div class="corr-date">${fmt(p.dt)}</div></div>`;
    html += `<div class="corr-gols minus">${pu.gols}</div>`;
    html += `<button class="corr-del" onclick="removerEvento('${id}', 'pun', ${i})">×</button>`;
    html += '</div>';
  }

  if (!col.fig.length && !col.pun.length) {
    html += '<div class="corr-empty">Nenhum evento para corrigir</div>';
  }

  html += '</div>';
  list.innerHTML = html;
}
function removerEvento(id, tipo, idx) {
  const col = getCol(id);
  if (tipo === 'fig') col.fig.splice(idx, 1);
  else if (tipo === 'pun') col.pun.splice(idx, 1);
  save();
  toast('Evento removido!');
  renderCorrList();
}

function renderRecompensas(el) {
  let html = '<div class="mgr-card"><h3>🎁 Gerenciar Recompensas</h3>';
  html += '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Clique para desbloquear/bloquear manualmente (não afeta gols):</div>';

  for (const m of MILESTONES) {
    html += `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border-radius:8px;margin-bottom:6px">`;
    html += `<div style="font-size:20px">${m.emoji}</div>`;
    html += `<div style="flex:1"><div style="font-weight:bold">${m.premio}</div><div style="font-size:11px;color:var(--muted)">${m.gols} gols</div></div>`;
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderBackup(el) {
  let html = '<div class="mgr-card"><h3>💾 Backup de Dados</h3>';
  html += '<button class="btn-p" onclick="copiarBackup()">📋 Copiar Dados</button>';
  html += '<button class="btn-p" onclick="baixarBackup()" style="margin-top:8px">⬇️ Baixar Backup (.json)</button>';
  html += '<div style="margin-top:14px"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">Restaurar dados (cole o JSON):</div>';
  html += '<textarea id="backupInput" style="width:100%;height:100px;background:#0d2508;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px;font-size:11px" placeholder="Cole aqui o conteúdo do backup..."></textarea>';
  html += '<button class="btn-p" onclick="restaurarBackup()" style="margin-top:8px">🔄 Restaurar</button>';
  html += '</div>';
  html += '<button class="btn-d" onclick="resetarDados()" style="margin-top:14px">⚠️ Resetar Tudo</button>';
  html += '</div>';
  el.innerHTML = html;
}
function copiarBackup() {
  const data = JSON.stringify({SEEDS, COLABS, MILESTONES, STICKERS, PUNICOES}, null, 2);
  navigator.clipboard.writeText(data).then(() => toast('Dados copiados!'));
}
function baixarBackup() {
  const data = JSON.stringify({SEEDS, COLABS, MILESTONES, STICKERS, PUNICOES}, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'copa-costao-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup baixado!');
}
function restaurarBackup() {
  const raw = document.getElementById('backupInput').value;
  if (!raw) { toast('Cole os dados primeiro'); return; }
  try {
    const data = JSON.parse(raw);
    if (data.SEEDS) SEEDS = data.SEEDS;
    if (data.COLABS) COLABS = data.COLABS;
    if (data.MILESTONES) MILESTONES = data.MILESTONES;
    if (data.STICKERS) STICKERS = data.STICKERS;
    if (data.PUNICOES) PUNICOES = data.PUNICOES;
    save();
    toast('Dados restaurados!');
    renderManager();
  } catch (e) {
    toast('Erro ao restaurar: JSON inválido');
  }
}
function resetarDados() {
  if (!confirm('⚠️ ATENÇÃO: Isso apagará TODOS os dados! Tem certeza?')) return;
  if (!confirm('Confirmação final: Todos os jogadores, gols e figurinhas serão perdidos. Continuar?')) return;
  SEEDS = [];
  COLABS = [];
  save();
  toast('Dados resetados!');
  renderManager();
  renderHome();
}

// ============ INICIALIZAÇÃO ============
function init() {
  document.getElementById('headerLogo').src = IMGS.logo;
  load();
  renderHome();
}
init();
</script>
